<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }
  .preview-area {
    flex: 1 1 auto;
    min-height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 16px;
    overflow: hidden;
    position: relative;
  }
  .preview-area video {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  .loading-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #ccc;
  }
  .loading-overlay.active { display: flex; }

  /* —— 时间轴编辑区 —— */
  .editor {
    flex: 0 0 auto;
    padding: 10px 16px 12px;
    background: #1d1d1d;
    border-top: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .editor-title {
    font-size: 12px;
    color: #aaa;
    line-height: 1.4;
  }
  .editor-title b { color: #ddd; font-weight: 600; }
  .editor-stats {
    font-size: 12px;
    color: #aaa;
    white-space: nowrap;
  }
  .editor-stats b { color: #fbbf24; font-weight: 600; }
  .editor-actions { display: flex; gap: 6px; }

  .timeline-wrap {
    position: relative;
    padding: 14px 0 16px;
  }
  .timeline {
    position: relative;
    height: 36px;
    background: #2a2a2a;
    border-radius: 4px;
    cursor: crosshair;
    overflow: visible;
  }
  .timeline.disabled { cursor: default; opacity: 0.5; }
  .timeline-segment {
    position: absolute;
    top: 0;
    bottom: 0;
    background: rgba(37, 99, 235, 0.45);
    border: 1px solid #2563eb;
    border-radius: 2px;
    box-sizing: border-box;
    cursor: grab;
    overflow: hidden;
  }
  .timeline-segment.selected {
    background: rgba(59, 130, 246, 0.65);
    border-color: #60a5fa;
    box-shadow: 0 0 0 1px rgba(96, 165, 250, 0.6);
  }
  .timeline-segment .seg-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-family: monospace;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    pointer-events: none;
    padding: 0 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .timeline-segment .seg-handle {
    position: absolute;
    top: 0; bottom: 0;
    width: 6px;
    background: #60a5fa;
    cursor: ew-resize;
  }
  .timeline-segment .seg-handle.left { left: -3px; border-radius: 2px 0 0 2px; }
  .timeline-segment .seg-handle.right { right: -3px; border-radius: 0 2px 2px 0; }
  .timeline-segment .seg-close {
    position: absolute;
    top: -10px;
    right: -8px;
    width: 16px;
    height: 16px;
    line-height: 14px;
    text-align: center;
    border-radius: 50%;
    background: #ef4444;
    color: #fff;
    font-size: 10px;
    cursor: pointer;
    display: none;
  }
  .timeline-segment.selected .seg-close { display: block; }

  .timeline-cursor {
    position: absolute;
    top: -2px;
    bottom: -2px;
    width: 2px;
    background: #fbbf24;
    pointer-events: none;
    box-shadow: 0 0 4px rgba(251, 191, 36, 0.7);
  }
  .timeline-ghost {
    position: absolute;
    top: 0; bottom: 0;
    background: rgba(96, 165, 250, 0.25);
    border: 1px dashed #60a5fa;
    pointer-events: none;
  }
  .timeline-ticks {
    position: relative;
    height: 14px;
    margin-top: 2px;
    font-family: monospace;
    font-size: 10px;
    color: #777;
  }
  .timeline-ticks span {
    position: absolute;
    top: 0;
    transform: translateX(-50%);
    white-space: nowrap;
  }
  .timeline-ticks span:first-child { transform: translateX(0); }
  .timeline-ticks span:last-child { transform: translateX(-100%); }

  .segment-list {
    max-height: 130px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 2px 0;
  }
  .segment-list:empty::before {
    content: "（未选择片段，导出将保留整段视频）";
    font-size: 12px;
    color: #777;
    padding: 4px 0;
  }
  .segment-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 8px;
    background: #1f1f1f;
    border: 1px solid #2c2c2c;
    border-radius: 4px;
    font-size: 12px;
    color: #ccc;
  }
  .segment-row.selected {
    border-color: #3b82f6;
    background: #1e293b;
  }
  .segment-row .seg-index {
    font-family: monospace;
    color: #777;
    min-width: 24px;
  }
  .segment-row label {
    color: #888;
    font-size: 11px;
  }
  .segment-row input.time-input {
    width: 76px;
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    color: #eee;
    padding: 3px 6px;
    border-radius: 3px;
    font-size: 12px;
    font-family: monospace;
    outline: none;
  }
  .segment-row input.time-input:focus { border-color: #3b82f6; }
  .segment-row input.time-input.invalid { border-color: #ef4444; color: #fca5a5; }
  .segment-row .seg-duration {
    font-family: monospace;
    color: #34d399;
    min-width: 58px;
    text-align: right;
  }
  .segment-row .seg-duration.invalid { color: #ef4444; }
  .segment-row .icon-btn {
    background: transparent;
    border: none;
    color: #888;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 14px;
  }
  .segment-row .icon-btn:hover { background: #3a3a3a; color: #ef4444; }

  /* —— 底部工具栏 —— */
  .toolbar {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto auto auto;
    align-items: stretch;
    padding: 12px 16px;
    background: #252525;
    border-top: 1px solid #333;
    gap: 12px;
  }
  .summary {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }
  .summary-label, .group-label {
    font-size: 11px;
    color: #7f7f7f;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .summary-value {
    font-size: 13px;
    color: #d4d4d4;
  }
  .group {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    min-width: 220px;
    padding: 10px 12px;
    background: #1f1f1f;
    border: 1px solid #333;
    border-radius: 8px;
  }
  .group-row {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 20px;
  }
  .group-meta {
    font-size: 13px;
    color: #c8c8c8;
    flex: 1;
    min-width: 0;
  }
  .group-meta.muted { color: #8a8a8a; }
  .saved-hint {
    font-size: 12px;
    color: #34d399;
    margin-top: 2px;
    word-break: break-all;
    line-height: 1.3;
  }
  select {
    background: #333;
    color: #fff;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
  .btn {
    padding: 7px 16px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-cancel { background: #444; color: #ccc; }
  .btn-video { background: #059669; color: #fff; }
  .btn-save { background: #2563eb; color: #fff; }
  .btn-add { background: #1e3a8a; color: #dbeafe; padding: 4px 10px; font-size: 12px; }
  .btn-reset { background: #3a3a3a; color: #ccc; padding: 4px 10px; font-size: 12px; }
</style>
</head>
<body>
  <div class="preview-area">
    <video id="video-preview" autoplay loop muted playsinline></video>
    <div class="loading-overlay" id="loading">处理中...</div>
  </div>

  <div class="editor">
    <div class="editor-header">
      <div class="editor-title">
        <b>时间片段编辑</b> · 在时间轴上拖动空白处选择新片段；拖动两端调整起止；点击片段后按 Delete 或 ✕ 删除
      </div>
      <div class="editor-stats" id="editor-stats">总时长：—</div>
    </div>
    <div class="timeline-wrap">
      <div class="timeline" id="timeline">
        <div class="timeline-cursor" id="timeline-cursor" style="display:none"></div>
      </div>
      <div class="timeline-ticks" id="timeline-ticks"></div>
    </div>
    <div class="segment-list" id="segment-list"></div>
    <div class="editor-actions">
      <button class="btn btn-add" id="btn-add-segment">+ 添加片段</button>
      <button class="btn btn-reset" id="btn-reset-segments">清空（保留整段）</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="summary">
      <span class="summary-label">预览</span>
      <span class="summary-value" id="preview-summary"></span>
    </div>
    <div class="group">
      <span class="group-label">GIF</span>
      <div class="group-row"><span class="group-meta" id="gif-info"></span></div>
      <div class="group-row">
        <span class="group-meta muted">缩放</span>
        <select id="quality-select">
          <option value="1">原始</option>
          <option value="0.75">75%</option>
          <option value="0.5">50%</option>
          <option value="0.25">25%</option>
        </select>
        <button class="btn btn-save" id="btn-save">保存 GIF</button>
      </div>
      <div class="saved-hint" id="gif-saved" style="display:none"></div>
    </div>
    <div class="group">
      <span class="group-label">视频</span>
      <div class="group-row"><span class="group-meta" id="video-info"></span></div>
      <div class="group-row"><button class="btn btn-video" id="btn-video">保存 MP4</button></div>
      <div class="saved-hint" id="video-saved" style="display:none"></div>
    </div>
    <div>
      <button class="btn btn-cancel" id="btn-cancel">取消</button>
    </div>
  </div>

  <script>
    const api = window.quickCapturePreview;
    const video = document.getElementById('video-preview');
    const previewSummary = document.getElementById('preview-summary');
    const gifInfo = document.getElementById('gif-info');
    const videoInfo = document.getElementById('video-info');
    const loading = document.getElementById('loading');
    const qualitySelect = document.getElementById('quality-select');
    const btnSave = document.getElementById('btn-save');
    const btnVideo = document.getElementById('btn-video');
    const btnCancel = document.getElementById('btn-cancel');
    const gifSaved = document.getElementById('gif-saved');
    const videoSaved = document.getElementById('video-saved');

    const timelineEl = document.getElementById('timeline');
    const timelineCursor = document.getElementById('timeline-cursor');
    const timelineTicks = document.getElementById('timeline-ticks');
    const segmentListEl = document.getElementById('segment-list');
    const editorStatsEl = document.getElementById('editor-stats');
    const btnAddSegment = document.getElementById('btn-add-segment');
    const btnResetSegments = document.getElementById('btn-reset-segments');

    // —— 状态 ——
    let previewData = null;
    let gifEstimating = false;
    let activeOperation = null;
    let lastSavedGifPath = null;
    let lastSavedVideoPath = null;
    let savePending = false;       // 用户点了「保存 GIF」但估算还没完成时，等估算完后自动重发
    let videoDuration = 0;          // 由 video.loadedmetadata 提供
    /** @type {{id: number, start: number, end: number}[]} */
    let segments = [];
    let selectedSegmentId = null;
    let nextSegmentId = 1;
    let segmentsDebounceTimer = null;
    const SEGMENTS_DEBOUNCE_MS = 350;
    const MIN_SEGMENT_DURATION = 0.1;

    // —— 工具函数：时间格式化 / 解析 ——
    function formatTime(sec) {
      if (!Number.isFinite(sec) || sec < 0) sec = 0;
      const totalDecisecs = Math.round(sec * 10);
      const ds = totalDecisecs % 10;
      const totalSec = (totalDecisecs - ds) / 10;
      const m = Math.floor(totalSec / 60);
      const s = totalSec - m * 60;
      return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0') + '.' + ds;
    }
    function formatDuration(sec) {
      if (!Number.isFinite(sec) || sec < 0) return '0.0s';
      if (sec < 60) return sec.toFixed(1) + 's';
      const m = Math.floor(sec / 60);
      const s = sec - m * 60;
      return m + ':' + s.toFixed(1).padStart(4, '0');
    }
    function parseTime(str) {
      const s = String(str || '').trim();
      if (!s) return NaN;
      if (s.includes(':')) {
        const parts = s.split(':');
        if (parts.length === 2) {
          const m = parseInt(parts[0], 10);
          const sec = parseFloat(parts[1]);
          if (!Number.isFinite(m) || !Number.isFinite(sec)) return NaN;
          return m * 60 + sec;
        }
        if (parts.length === 3) {
          const h = parseInt(parts[0], 10);
          const m = parseInt(parts[1], 10);
          const sec = parseFloat(parts[2]);
          if (!Number.isFinite(h) || !Number.isFinite(m) || !Number.isFinite(sec)) return NaN;
          return h * 3600 + m * 60 + sec;
        }
        return NaN;
      }
      return parseFloat(s);
    }
    function formatBytes(bytes) {
      if (!Number.isFinite(bytes)) return '—';
      const sizeKB = bytes / 1024;
      return sizeKB >= 1024 ? (sizeKB / 1024).toFixed(1) + ' MB' : sizeKB.toFixed(1) + ' KB';
    }
    function scaleLabel(scale) {
      return scale >= 1 ? '原始' : Math.round(scale * 100) + '%';
    }
    function clampToVideo(t) {
      const d = videoDuration > 0 ? videoDuration : Infinity;
      return Math.max(0, Math.min(d, t));
    }

    // —— 段落数据辅助 ——
    function isSegmentValid(seg) {
      return Number.isFinite(seg.start) && Number.isFinite(seg.end)
        && seg.end > seg.start
        && seg.end - seg.start >= MIN_SEGMENT_DURATION
        && seg.start >= 0
        && (videoDuration <= 0 || seg.end <= videoDuration + 0.01);
    }
    function getValidSegments() {
      return segments
        .filter(isSegmentValid)
        .map((s) => ({ start: clampToVideo(s.start), end: clampToVideo(s.end) }))
        .sort((a, b) => a.start - b.start);
    }
    function totalSegmentsDuration() {
      return getValidSegments().reduce((sum, s) => sum + (s.end - s.start), 0);
    }
    function effectiveDuration() {
      const total = totalSegmentsDuration();
      if (total > 0) return total;
      return videoDuration;
    }

    // —— 把当前 segments 推送给后端，重新触发 GIF 估算 ——
    function scheduleSegmentsUpdate() {
      if (segmentsDebounceTimer) clearTimeout(segmentsDebounceTimer);
      segmentsDebounceTimer = setTimeout(() => {
        segmentsDebounceTimer = null;
        api.updateSegments(getValidSegments());
      }, SEGMENTS_DEBOUNCE_MS);
    }
    function flushSegmentsUpdate() {
      if (segmentsDebounceTimer) {
        clearTimeout(segmentsDebounceTimer);
        segmentsDebounceTimer = null;
        api.updateSegments(getValidSegments());
      }
    }

    // —— 渲染时间轴标尺 ——
    function renderTicks() {
      timelineTicks.innerHTML = '';
      if (videoDuration <= 0) return;
      // 按总时长选一个合理的步长
      let step;
      if (videoDuration <= 5) step = 0.5;
      else if (videoDuration <= 15) step = 1;
      else if (videoDuration <= 60) step = 5;
      else if (videoDuration <= 180) step = 15;
      else step = 30;
      for (let t = 0; t <= videoDuration + 1e-3; t += step) {
        const span = document.createElement('span');
        const pct = (t / videoDuration) * 100;
        span.style.left = pct + '%';
        span.textContent = formatTime(t);
        timelineTicks.appendChild(span);
      }
    }

    // —— 渲染时间轴上的片段块 ——
    function renderTimelineSegments() {
      // 清掉旧的（保留 cursor / ghost）
      [...timelineEl.querySelectorAll('.timeline-segment')].forEach((el) => el.remove());
      if (videoDuration <= 0) return;
      for (const seg of segments) {
        const el = document.createElement('div');
        el.className = 'timeline-segment' + (seg.id === selectedSegmentId ? ' selected' : '');
        el.dataset.id = String(seg.id);
        const startPct = (Math.max(0, seg.start) / videoDuration) * 100;
        const endPct = (Math.min(videoDuration, seg.end) / videoDuration) * 100;
        el.style.left = startPct + '%';
        el.style.width = Math.max(0.5, endPct - startPct) + '%';
        const label = document.createElement('div');
        label.className = 'seg-label';
        label.textContent = formatTime(seg.start) + ' – ' + formatTime(seg.end);
        el.appendChild(label);
        const lh = document.createElement('div');
        lh.className = 'seg-handle left';
        lh.dataset.role = 'handle-left';
        el.appendChild(lh);
        const rh = document.createElement('div');
        rh.className = 'seg-handle right';
        rh.dataset.role = 'handle-right';
        el.appendChild(rh);
        const close = document.createElement('div');
        close.className = 'seg-close';
        close.textContent = '✕';
        close.dataset.role = 'close';
        el.appendChild(close);
        timelineEl.appendChild(el);
      }
    }

    // —— 渲染下面的片段列表 ——
    function renderSegmentList() {
      segmentListEl.innerHTML = '';
      const sorted = [...segments].sort((a, b) => a.start - b.start);
      sorted.forEach((seg, idx) => {
        const row = document.createElement('div');
        row.className = 'segment-row' + (seg.id === selectedSegmentId ? ' selected' : '');
        row.dataset.id = String(seg.id);

        const idxEl = document.createElement('span');
        idxEl.className = 'seg-index';
        idxEl.textContent = '#' + (idx + 1);
        row.appendChild(idxEl);

        const startLabel = document.createElement('label');
        startLabel.textContent = '起';
        row.appendChild(startLabel);
        const startInput = document.createElement('input');
        startInput.type = 'text';
        startInput.className = 'time-input';
        startInput.value = formatTime(seg.start);
        startInput.title = '支持 1:23.4 或 83.4 这种写法';
        startInput.addEventListener('change', () => onTimeInput(seg, 'start', startInput));
        startInput.addEventListener('blur', () => onTimeInput(seg, 'start', startInput));
        row.appendChild(startInput);

        const endLabel = document.createElement('label');
        endLabel.textContent = '止';
        row.appendChild(endLabel);
        const endInput = document.createElement('input');
        endInput.type = 'text';
        endInput.className = 'time-input';
        endInput.value = formatTime(seg.end);
        endInput.title = '支持 1:23.4 或 83.4 这种写法';
        endInput.addEventListener('change', () => onTimeInput(seg, 'end', endInput));
        endInput.addEventListener('blur', () => onTimeInput(seg, 'end', endInput));
        row.appendChild(endInput);

        const dur = document.createElement('span');
        dur.className = 'seg-duration' + (isSegmentValid(seg) ? '' : ' invalid');
        dur.textContent = isSegmentValid(seg) ? formatDuration(seg.end - seg.start) : '× 无效';
        row.appendChild(dur);

        const del = document.createElement('button');
        del.className = 'icon-btn';
        del.textContent = '✕';
        del.title = '删除该片段';
        del.addEventListener('click', () => deleteSegment(seg.id));
        row.appendChild(del);

        row.addEventListener('mousedown', (e) => {
          if (e.target instanceof HTMLInputElement) return;
          selectedSegmentId = seg.id;
          renderTimelineSegments();
          renderSegmentList();
        });

        segmentListEl.appendChild(row);
      });
    }

    function onTimeInput(seg, field, input) {
      const parsed = parseTime(input.value);
      if (!Number.isFinite(parsed)) {
        input.classList.add('invalid');
        return;
      }
      input.classList.remove('invalid');
      seg[field] = clampToVideo(parsed);
      // 起止颠倒就交换一下；之后由 rerender() 把所有 input 的展示值刷新到正确状态
      if (seg.start > seg.end) {
        const tmp = seg.start;
        seg.start = seg.end;
        seg.end = tmp;
      }
      onSegmentsChanged();
    }

    function renderStats() {
      if (videoDuration <= 0) {
        editorStatsEl.textContent = '总时长：—';
        return;
      }
      const total = totalSegmentsDuration();
      if (total <= 0) {
        editorStatsEl.innerHTML = '当前导出：<b>整段 ' + formatDuration(videoDuration) + '</b>';
      } else {
        editorStatsEl.innerHTML = '当前导出：<b>' + formatDuration(total)
          + '</b><span style="color:#666"> / 原始 ' + formatDuration(videoDuration) + '</span>';
      }
    }

    function rerender() {
      renderTimelineSegments();
      renderSegmentList();
      renderStats();
    }

    // —— 段落变更入口（任何编辑/添加/删除最终都走这里） ——
    function onSegmentsChanged() {
      rerender();
      scheduleSegmentsUpdate();
    }

    function deleteSegment(id) {
      segments = segments.filter((s) => s.id !== id);
      if (selectedSegmentId === id) selectedSegmentId = null;
      onSegmentsChanged();
    }

    function addSegmentAtRange(start, end) {
      start = clampToVideo(start);
      end = clampToVideo(end);
      if (end - start < MIN_SEGMENT_DURATION) return null;
      const seg = { id: nextSegmentId++, start, end };
      segments.push(seg);
      selectedSegmentId = seg.id;
      onSegmentsChanged();
      return seg;
    }

    function resetSegments() {
      segments = [];
      selectedSegmentId = null;
      onSegmentsChanged();
    }

    // —— 时间轴鼠标交互（拖出新片段 / 拖动片段 / 拖动手柄） ——
    function timelineRect() { return timelineEl.getBoundingClientRect(); }
    function timeAtClientX(clientX) {
      const rect = timelineRect();
      const ratio = (clientX - rect.left) / rect.width;
      return clampToVideo(ratio * videoDuration);
    }

    let dragState = null;
    let ghostEl = null;

    timelineEl.addEventListener('mousedown', (e) => {
      if (videoDuration <= 0 || e.button !== 0) return;
      const targetSegment = e.target.closest('.timeline-segment');
      const role = e.target.dataset && e.target.dataset.role;

      // 点关闭按钮：删除
      if (role === 'close' && targetSegment) {
        e.preventDefault();
        e.stopPropagation();
        deleteSegment(Number(targetSegment.dataset.id));
        return;
      }

      // 点击片段两端的手柄：resize
      if ((role === 'handle-left' || role === 'handle-right') && targetSegment) {
        e.preventDefault();
        const id = Number(targetSegment.dataset.id);
        const seg = segments.find((s) => s.id === id);
        if (!seg) return;
        selectedSegmentId = id;
        rerender();
        dragState = {
          mode: role === 'handle-left' ? 'resize-left' : 'resize-right',
          id,
          startX: e.clientX,
          origStart: seg.start,
          origEnd: seg.end,
        };
        return;
      }

      // 点击片段主体：开始整体拖动
      if (targetSegment) {
        e.preventDefault();
        const id = Number(targetSegment.dataset.id);
        const seg = segments.find((s) => s.id === id);
        if (!seg) return;
        selectedSegmentId = id;
        rerender();
        dragState = {
          mode: 'move',
          id,
          startX: e.clientX,
          origStart: seg.start,
          origEnd: seg.end,
          moved: false,
        };
        return;
      }

      // 在空白处按下：拖出一个新片段
      e.preventDefault();
      const startTime = timeAtClientX(e.clientX);
      dragState = {
        mode: 'create',
        startX: e.clientX,
        startTime,
        currentTime: startTime,
      };
      ghostEl = document.createElement('div');
      ghostEl.className = 'timeline-ghost';
      ghostEl.style.left = (startTime / videoDuration * 100) + '%';
      ghostEl.style.width = '0%';
      timelineEl.appendChild(ghostEl);
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragState) return;
      const cur = timeAtClientX(e.clientX);
      if (dragState.mode === 'create') {
        dragState.currentTime = cur;
        const a = Math.min(dragState.startTime, cur);
        const b = Math.max(dragState.startTime, cur);
        if (ghostEl) {
          ghostEl.style.left = (a / videoDuration * 100) + '%';
          ghostEl.style.width = Math.max(0, ((b - a) / videoDuration * 100)) + '%';
        }
        return;
      }
      const seg = segments.find((s) => s.id === dragState.id);
      if (!seg) return;
      const rect = timelineRect();
      const dxRatio = (e.clientX - dragState.startX) / rect.width;
      const dt = dxRatio * videoDuration;
      if (dragState.mode === 'resize-left') {
        seg.start = clampToVideo(Math.min(dragState.origEnd - MIN_SEGMENT_DURATION, dragState.origStart + dt));
      } else if (dragState.mode === 'resize-right') {
        seg.end = clampToVideo(Math.max(dragState.origStart + MIN_SEGMENT_DURATION, dragState.origEnd + dt));
      } else if (dragState.mode === 'move') {
        const len = dragState.origEnd - dragState.origStart;
        let newStart = dragState.origStart + dt;
        newStart = Math.max(0, Math.min(videoDuration - len, newStart));
        seg.start = newStart;
        seg.end = newStart + len;
        if (Math.abs(dt) > 0.05) dragState.moved = true;
      }
      rerender();
    });

    document.addEventListener('mouseup', (e) => {
      if (!dragState) return;
      if (dragState.mode === 'create') {
        const a = Math.min(dragState.startTime, dragState.currentTime);
        const b = Math.max(dragState.startTime, dragState.currentTime);
        if (b - a >= MIN_SEGMENT_DURATION) {
          addSegmentAtRange(a, b);
        } else if (videoDuration > 0) {
          // 单击空白：把视频跳到该位置
          video.currentTime = a;
        }
        if (ghostEl) { ghostEl.remove(); ghostEl = null; }
      } else {
        // 拖动 / 缩放：完成后通知后端
        scheduleSegmentsUpdate();
      }
      dragState = null;
    });

    // —— 视频播放：跟随片段（跳过未选区间） ——
    video.addEventListener('loadedmetadata', () => {
      if (Number.isFinite(video.duration) && video.duration > 0) {
        videoDuration = video.duration;
        renderTicks();
        rerender();
      }
      updateSummary(previewData);
    });
    // fragmented mp4 在 Chromium 上 duration 偶尔到 durationchange 才会出来
    video.addEventListener('durationchange', () => {
      if (Number.isFinite(video.duration) && video.duration > 0 && videoDuration !== video.duration) {
        videoDuration = video.duration;
        renderTicks();
        rerender();
      }
    });
    video.addEventListener('timeupdate', () => {
      if (videoDuration > 0) {
        const pct = (video.currentTime / videoDuration) * 100;
        timelineCursor.style.left = pct + '%';
        timelineCursor.style.display = 'block';
      }
      const valid = getValidSegments();
      if (valid.length === 0 || video.paused || video.seeking) return;
      const t = video.currentTime;
      // 找到包含 t 的片段
      const inside = valid.find((s) => t >= s.start - 0.005 && t < s.end);
      if (inside) return;
      // 不在任何片段内：跳到下一个片段开头
      const next = valid.find((s) => s.start >= t);
      if (next) {
        video.currentTime = next.start;
      } else {
        // 已经在所有片段之后，循环回第一个片段开头
        video.currentTime = valid[0].start;
      }
    });

    // —— 上下文：键盘 ——
    document.addEventListener('keydown', (event) => {
      // 焦点在输入框时不抢键
      const isInput = document.activeElement && document.activeElement.tagName === 'INPUT';
      if ((event.key === 'Delete' || event.key === 'Backspace') && !isInput && selectedSegmentId !== null) {
        event.preventDefault();
        deleteSegment(selectedSegmentId);
        return;
      }
      if (isInput) return;
      if (activeOperation !== null || gifEstimating) return;
      if (event.key === 'Enter') requestSaveGif();
      if (event.key === 'Escape') api.cancel();
    });

    // —— UI 更新（沿用旧的 GIF/MP4 信息块） ——
    function updateSummary(data) {
      if (!data) return;
      const parts = [];
      if (video.videoWidth && video.videoHeight) parts.push(video.videoWidth + 'x' + video.videoHeight);
      if (video.duration && isFinite(video.duration)) parts.push(video.duration.toFixed(1) + 's');
      previewSummary.textContent = parts.join(' · ');
    }
    function updateGifInfo(data) {
      if (!data) return;
      if (data.error && data.errorTarget === 'gif') {
        gifInfo.textContent = data.error;
        return;
      }
      if (data.estimatingGif) {
        gifInfo.textContent = '正在估算 ' + scaleLabel(data.exportScale)
          + (data.segmentCount > 0 ? ' · ' + data.segmentCount + ' 段' : '')
          + ' GIF...';
        return;
      }
      const parts = [];
      if (data.estimatedGifWidth && data.estimatedGifHeight) parts.push(data.estimatedGifWidth + 'x' + data.estimatedGifHeight);
      if (data.estimatedGifFrames) parts.push(data.estimatedGifFrames + ' 帧');
      if (typeof data.estimatedGifSize === 'number') parts.push(formatBytes(data.estimatedGifSize));
      parts.push(scaleLabel(data.exportScale));
      if (data.segmentCount > 0) parts.push(data.segmentCount + ' 段拼接');
      gifInfo.textContent = parts.join(' · ');
    }
    function updateVideoInfo(data) {
      if (!data) return;
      if (data.error && data.errorTarget === 'video') {
        videoInfo.textContent = data.error;
        return;
      }
      if (data.segmentCount > 0) {
        videoInfo.textContent = '导出 MP4 时按片段重新编码 · 原始 ' + formatBytes(data.videoSize);
        return;
      }
      videoInfo.textContent = '原始 MP4 · ' + formatBytes(data.videoSize);
    }
    function syncControls() {
      const locked = activeOperation !== null;
      loading.classList.toggle('active', locked);
      btnSave.disabled = locked || gifEstimating;
      qualitySelect.disabled = locked || gifEstimating;
      btnVideo.disabled = locked;
      btnCancel.disabled = locked;
      btnAddSegment.disabled = locked || videoDuration <= 0;
      btnResetSegments.disabled = locked || segments.length === 0;
      const anySaved = !!(lastSavedGifPath || lastSavedVideoPath);
      btnCancel.textContent = anySaved ? '关闭' : '取消';
    }
    function updateSavedHints() {
      if (lastSavedGifPath) {
        gifSaved.textContent = '✓ 已保存：' + lastSavedGifPath;
        gifSaved.style.display = 'block';
      } else { gifSaved.style.display = 'none'; }
      if (lastSavedVideoPath) {
        videoSaved.textContent = '✓ 已保存：' + lastSavedVideoPath;
        videoSaved.style.display = 'block';
      } else { videoSaved.style.display = 'none'; }
    }

    function requestSaveGif() {
      flushSegmentsUpdate();
      if (gifEstimating) {
        savePending = true;
        return;
      }
      if (activeOperation !== null) return;
      activeOperation = 'gif';
      loading.textContent = '正在导出 GIF...';
      syncControls();
      api.save();
    }

    api.onPreviewData((data) => {
      previewData = data;
      gifEstimating = !!data.estimatingGif;
      video.src = data.mediaUrl;
      video.currentTime = 0;
      video.play().catch(() => {});
      updateSummary(data);
      updateGifInfo(data);
      updateVideoInfo(data);
      syncControls();
    });

    api.onQualityResult((data) => {
      gifEstimating = !!data.estimatingGif;
      previewData = Object.assign({}, previewData, data);
      if (data.error || data.released) activeOperation = null;
      if (typeof data.lastSavedGifPath !== 'undefined') lastSavedGifPath = data.lastSavedGifPath;
      if (typeof data.lastSavedVideoPath !== 'undefined') lastSavedVideoPath = data.lastSavedVideoPath;
      updateSummary(previewData);
      updateGifInfo(previewData);
      updateVideoInfo(previewData);
      updateSavedHints();
      syncControls();
      // 用户在估算中点了「保存 GIF」并设置了 savePending：估算结束就自动重发
      if (savePending && !data.estimatingGif && !data.error && activeOperation === null) {
        savePending = false;
        requestSaveGif();
      }
    });

    qualitySelect.addEventListener('change', () => {
      const scale = parseFloat(qualitySelect.value);
      gifEstimating = true;
      previewData = Object.assign({}, previewData || {}, {
        exportScale: scale,
        estimatingGif: true,
        error: null,
        errorTarget: null,
      });
      updateGifInfo(previewData);
      syncControls();
      api.changeQuality(scale);
    });
    btnSave.addEventListener('click', () => requestSaveGif());
    btnVideo.addEventListener('click', () => {
      if (activeOperation !== null) return;
      flushSegmentsUpdate();
      activeOperation = 'video';
      loading.textContent = '正在保存 MP4...';
      syncControls();
      api.saveVideo();
    });
    btnCancel.addEventListener('click', () => api.cancel());
    btnAddSegment.addEventListener('click', () => {
      if (videoDuration <= 0) return;
      // 优先在当前播放头位置加一个 1s 片段；不行就加 0..min(2, duration)
      const tryStart = Math.max(0, Math.min(videoDuration - 1, video.currentTime || 0));
      const span = Math.min(1, videoDuration);
      addSegmentAtRange(tryStart, Math.min(videoDuration, tryStart + span));
    });
    btnResetSegments.addEventListener('click', () => resetSegments());

    // 初始一次渲染（此时 videoDuration 还是 0，list 渲染为空白）
    rerender();
    syncControls();
  </script>
</body>
</html>
