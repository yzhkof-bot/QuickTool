<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>QuickTool Capture Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      cursor: crosshair;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #annotation-toolbar {
      display: none;
      position: absolute;
      background: rgba(30, 30, 30, 0.9);
      border-radius: 8px;
      padding: 6px;
      gap: 4px;
      flex-direction: row;
      align-items: center;
      z-index: 100;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    #annotation-toolbar button {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #annotation-toolbar button:hover { background: rgba(255,255,255,0.15); }
    #annotation-toolbar button.active { background: rgba(255,255,255,0.25); }
    .color-btn {
      width: 20px !important;
      height: 20px !important;
      border-radius: 50% !important;
      border: 2px solid rgba(255,255,255,0.5) !important;
      min-width: 20px;
    }
    .toolbar-divider {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,0.2);
      margin: 0 2px;
    }
    #text-input {
      display: none;
      position: absolute;
      background: transparent;
      border: 1px dashed rgba(255,255,255,0.5);
      color: #ff0000;
      font-size: 16px;
      font-family: Arial, Helvetica, sans-serif;
      outline: none;
      padding: 2px 4px;
      min-width: 100px;
      z-index: 200;
    }
    #size-label {
      display: none;
      position: absolute;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-family: monospace;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 3px;
      pointer-events: none;
      z-index: 50;
    }
  </style>
</head>
<body>
  <canvas id="overlay-canvas"></canvas>
  <div id="size-label"></div>
  <div id="annotation-toolbar">
    <button id="btn-arrow" title="箭头">↗</button>
    <button id="btn-text" title="文字">T</button>
    <div class="toolbar-divider"></div>
    <button class="color-btn" id="color-red" style="background:#ff0000" title="红色"></button>
    <button class="color-btn" id="color-yellow" style="background:#ffff00" title="黄色"></button>
    <button class="color-btn" id="color-green" style="background:#00ff00" title="绿色"></button>
    <div class="toolbar-divider"></div>
    <button id="btn-confirm" title="确认">✓</button>
    <button id="btn-cancel" title="取消">✕</button>
  </div>
  <input type="text" id="text-input" />
  <script src="overlay.js"></script>
</body>
</html>
